name: Publish to npm

# Default path: OIDC Trusted Publishing (no token required, provenance attached).
# Prerequisite: configure a trusted publisher at npmjs.com for the package.
# Fallback: pass NPM_TOKEN secret for repositories without trusted publishing.
# See: https://docs.npmjs.com/trusted-publishers/

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version (>=24 ships npm v11 for OIDC).'
        required: false
        type: string
        default: '24'
      access:
        description: 'Package access level (public or restricted).'
        required: false
        type: string
        default: 'public'
      registry-url:
        description: 'npm registry URL.'
        required: false
        type: string
        default: 'https://registry.npmjs.org'
    secrets:
      NPM_TOKEN:
        description: 'Optional npm token fallback if Trusted Publishing is not configured.'
        required: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.registry-url }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test --if-present

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access ${{ inputs.access }} --provenance
