name: Publish to npm (Bun)

# Builds with Bun, publishes via npm CLI.
# Default path: OIDC Trusted Publishing (no token required, provenance attached).
# Prerequisite: configure a trusted publisher at npmjs.com for the package.
# Fallback: pass NPM_TOKEN secret and OIDC will be bypassed automatically.
# See: https://docs.npmjs.com/trusted-publishers/

on:
  workflow_call:
    inputs:
      bun-version:
        description: 'Bun version to install for build and test.'
        required: false
        type: string
        default: 'latest'
      node-version:
        description: 'Node.js version used to run npm publish (>=24 ships npm v11 for OIDC).'
        required: false
        type: string
        default: '24'
      access:
        description: 'Package access level (public or restricted).'
        required: false
        type: string
        default: 'public'
    secrets:
      NPM_TOKEN:
        description: 'Optional npm token fallback if Trusted Publishing is not configured.'
        required: false

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: |
          if jq -e '.scripts.build' package.json > /dev/null 2>&1; then
            bun run build
          fi

      - name: Test
        run: |
          if find . -maxdepth 3 \( -name '*.test.*' -o -name '*.spec.*' -o -path './test/*' -o -path './tests/*' \) -print -quit | grep -q .; then
            bun test
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access ${{ inputs.access }} --provenance
