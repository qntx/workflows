name: Container Build

# Builds and pushes a container image with multi-arch, SBOM and provenance.
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-docker-images

on:
  workflow_call:
    inputs:
      registry:
        description: 'Container registry to push to.'
        required: false
        type: string
        default: 'ghcr.io'
      image-name:
        description: 'Image name (defaults to repository name).'
        required: false
        type: string
        default: ''
      platforms:
        description: 'Target platforms for multi-arch build.'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      push:
        description: 'Whether to push the image.'
        required: false
        type: boolean
        default: true
      dockerfile:
        description: 'Path to the Containerfile/Dockerfile. Empty auto-detects Dockerfile then Containerfile.'
        required: false
        type: string
        default: ''
      context:
        description: 'Build context path.'
        required: false
        type: string
        default: '.'
      no-cache:
        description: 'Disable build cache (force rebuild).'
        required: false
        type: boolean
        default: false
    secrets:
      registry-username:
        description: 'Optional registry username (defaults to github.actor).'
        required: false
      registry-password:
        description: 'Optional registry password (defaults to GITHUB_TOKEN).'
        required: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: container-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ${{ inputs.registry }}
  IMAGE_NAME: ${{ inputs.image-name || github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Detect Containerfile
        id: detect
        shell: bash
        run: |
          if [ -n "${{ inputs.dockerfile }}" ]; then
            path="${{ inputs.dockerfile }}"
          elif [ -f "${{ inputs.context }}/Dockerfile" ]; then
            path="${{ inputs.context }}/Dockerfile"
          elif [ -f "${{ inputs.context }}/Containerfile" ]; then
            path="${{ inputs.context }}/Containerfile"
          else
            echo "::error::No Dockerfile or Containerfile found under ${{ inputs.context }}."
            exit 1
          fi
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        if: inputs.push
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.registry-username || github.actor }}
          password: ${{ secrets.registry-password || secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ steps.detect.outputs.path }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: ${{ inputs.no-cache }}
          cache-from: ${{ !inputs.no-cache && 'type=gha' || '' }}
          cache-to: ${{ !inputs.no-cache && 'type=gha,mode=max' || '' }}
          provenance: mode=max
          sbom: true

      - name: Generate artifact attestation
        if: inputs.push && steps.build.outputs.digest != ''
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
