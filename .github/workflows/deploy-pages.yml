name: Deploy to GitHub Pages

on:
  workflow_call:
    inputs:
      path:
        description: 'Directory containing the built site to upload.'
        required: false
        type: string
        default: 'dist'
      bun-version:
        description: 'Bun version to install.'
        required: false
        type: string
        default: 'latest'
      install-command:
        description: 'Command used to install dependencies.'
        required: false
        type: string
        default: 'bun install --frozen-lockfile'
      build-command:
        description: 'Command used to build the site.'
        required: false
        type: string
        default: 'bun run build'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Install dependencies
        run: ${{ inputs.install-command }}

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ inputs.path }}

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
