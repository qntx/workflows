name: Node.js CI

on:
  workflow_call:
    inputs:
      node-versions:
        description: 'JSON array of Node.js versions to test against.'
        required: false
        type: string
        default: '["20", "22", "24"]'
      package-manager:
        description: 'Package manager to use (npm, pnpm, yarn).'
        required: false
        type: string
        default: 'npm'
      fail-fast:
        description: 'Abort the matrix on the first failure.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: ${{ inputs.fail-fast }}
      matrix:
        node-version: ${{ fromJSON(inputs.node-versions) }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: |
          set -euo pipefail
          case "${{ inputs.package-manager }}" in
            npm)
              npm ci
              ;;
            pnpm)
              corepack enable
              pnpm install --frozen-lockfile
              ;;
            yarn)
              corepack enable
              # yarn >=2 uses --immutable; yarn 1.x uses --frozen-lockfile.
              if yarn --version | grep -q '^1\.'; then
                yarn install --frozen-lockfile
              else
                yarn install --immutable
              fi
              ;;
            *)
              echo "::error::Unsupported package manager: ${{ inputs.package-manager }}"
              exit 1
              ;;
          esac

      - name: Lint
        run: |
          if jq -e '.scripts.lint' package.json > /dev/null 2>&1; then
            ${{ inputs.package-manager }} run lint
          else
            echo 'No lint script defined, skipping.'
          fi

      - name: Typecheck
        run: |
          if jq -e '.scripts.typecheck' package.json > /dev/null 2>&1; then
            ${{ inputs.package-manager }} run typecheck
          else
            echo 'No typecheck script defined, skipping.'
          fi

      - name: Build
        run: |
          if jq -e '.scripts.build' package.json > /dev/null 2>&1; then
            ${{ inputs.package-manager }} run build
          else
            echo 'No build script defined, skipping.'
          fi

      - name: Test
        run: |
          if jq -e '.scripts.test' package.json > /dev/null 2>&1; then
            ${{ inputs.package-manager }} test
          else
            echo 'No test script defined, skipping.'
          fi
